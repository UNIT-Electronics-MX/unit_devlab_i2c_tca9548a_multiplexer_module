name: Copy Hardware Documentation

on:
  push:
    branches: [ main ]
    paths:
      - 'hardware/**'
  workflow_dispatch: # Permite ejecutar manualmente

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  copy-hardware-docs:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Jinja2
        
    - name: Clean previous documentation
      run: |
        chmod +x .github/scripts/clean_docs.sh
        .github/scripts/clean_docs.sh
        
    - name: Copy hardware files and generate HTML
      run: |
        chmod +x .github/scripts/build_docs.sh
        .github/scripts/build_docs.sh
        
    - name: Validate docs structure
      run: |
        echo "Checking required docs structure..."
        for f in docs/index.html docs/hardware/README.md; do
          if [ ! -f "$f" ]; then
            echo "ERROR: Missing required file: $f"
            exit 1
          fi
        done
        echo "Docs structure OK"

    - name: Commit and push changes
      if: github.event_name != 'pull_request'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docs/
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "fix(docs): update docs structure from hardware changes [skip ci]"
          git push
        else
          echo "No changes to commit"
        fi